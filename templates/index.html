<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE TET // UNIVERSAL MEDIA EXTRACTOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#dededa;--panel:#ecece8;--panel-2:#f4f4f1;--ink:#0c0c0d;--ink-2:#2a2a2c;
    --muted:#8b8b85;--muted-2:#a7a7a1;--line:#c7c7c1;--red:#e61919;--tape:#0c0c0e;
    --mono:'JetBrains Mono',monospace;--tech:'Chakra Petch',sans-serif;--sp:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--mono);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100vh;position:relative;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:52px 52px;opacity:.22;mask-image:radial-gradient(ellipse 95% 80% at 50% 45%,#000 50%,transparent 100%)}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:repeating-linear-gradient(135deg,rgba(0,0,0,.04) 0 2px,transparent 2px 8px);
    mask-image:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 62%,#000 100%);opacity:.55}
  .grain{position:fixed;inset:0;pointer-events:none;z-index:60;opacity:.045;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:160px;mix-blend-mode:multiply}
  .vframe{position:fixed;inset:14px;pointer-events:none;z-index:40}
  .vframe i{position:absolute;width:24px;height:24px;border:2px solid var(--ink)}
  .vframe i.tl{top:0;left:0;border-right:0;border-bottom:0}
  .vframe i.tr{top:0;right:0;border-left:0;border-bottom:0}
  .vframe i.bl{bottom:0;left:0;border-right:0;border-top:0}
  .vframe i.br{bottom:0;right:0;border-left:0;border-top:0}
  .vframe i.tr::after{content:'';position:absolute;top:-2px;right:-2px;width:9px;height:9px;background:var(--red)}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:28px 38px 80px}
  .topbar{display:flex;align-items:center;gap:18px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:9px}
  .topbar b{color:var(--ink);font-weight:700}
  .blink{width:7px;height:7px;background:var(--red);display:inline-block;animation:blink 1.3s steps(1) infinite}
  @keyframes blink{50%{opacity:.15}}
  .brand{display:flex;align-items:center;gap:18px;margin-top:30px}
  .logo{width:60px;height:57px;flex-shrink:0;object-fit:contain;object-position:center}
  .bk .name{font-family:var(--tech);font-size:30px;font-weight:700;line-height:1;letter-spacing:.04em;text-transform:uppercase}
  .bk .name .the{font-weight:400;color:var(--muted);font-size:18px;letter-spacing:.18em;margin-right:8px}
  .bk .name .dot{color:var(--red)}
  .bk .desc{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:7px}
  .stack{max-width:680px;margin:0 auto}
  .hero{padding-top:13vh;padding-bottom:8vh}
  .console{width:100%;border:1.5px solid var(--ink);background:var(--panel);position:relative}
  .console::before{content:'[ INPUT // SOURCE URL ]';position:absolute;top:-9px;left:18px;background:var(--bg);
    font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink);padding:0 8px;text-transform:uppercase}
  .console-row{display:flex;align-items:stretch}
  .prompt{display:flex;align-items:center;padding:0 12px 0 20px;color:var(--red);font-family:var(--tech);font-weight:700;font-size:20px}
  .console input{flex:1;border:0;background:transparent;outline:none;font-family:var(--mono);font-size:13.5px;
    color:var(--ink);padding:21px 10px;letter-spacing:.02em}
  .console input::placeholder{color:var(--muted-2)}
  .fetch{border:0;border-left:1.5px solid var(--ink);background:var(--ink);color:var(--bg);font-family:var(--tech);
    font-weight:700;font-size:14px;letter-spacing:.14em;text-transform:uppercase;padding:0 28px;cursor:pointer;
    display:flex;align-items:center;gap:9px;transition:background .25s cubic-bezier(.32,.72,0,1)}
  .fetch:hover{background:var(--red)}
  .fetch:disabled{opacity:.5;cursor:not-allowed}
  .detect{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .detect .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-right:2px}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);padding:5px 11px;background:var(--panel-2);transition:.2s}
  .chip.on{color:var(--bg);background:var(--red);border-color:var(--red)}
  .qsection{margin-top:18px;display:none}
  .qsection.show{display:block}
  .secthead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .secthead .h{font-family:var(--tech);font-weight:600;font-size:12px;letter-spacing:.22em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
  .secthead .h .sl{color:var(--red);font-weight:700}
  .secthead .meta{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
  .qcard{border:1.5px solid var(--ink);background:var(--panel);margin-bottom:14px;
    animation:slide .4s cubic-bezier(.16,1,.3,1)}
  @keyframes slide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .qhead{display:flex;align-items:center;gap:12px;padding:13px 16px}
  .qhead .tag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;background:var(--red);color:#fff;padding:3px 7px;text-transform:uppercase;flex:none}
  .qhead .ttl{font-family:var(--tech);font-weight:600;font-size:15px;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qhead .ji{margin-left:auto;font-family:var(--sp);font-size:10px;color:var(--muted);letter-spacing:.08em;white-space:nowrap;flex:none}
  .tape{background:var(--tape);border-top:1.5px solid var(--ink);padding:14px 16px 12px;position:relative;overflow:hidden}
  .tape::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(255,255,255,.025) 2px 3px)}
  .tape-top{display:flex;align-items:center;gap:10px;margin-bottom:13px;position:relative;z-index:1}
  .tape-top .erc{font-family:var(--tech);font-weight:700;font-size:12px;letter-spacing:.04em;color:#0c0c0e;background:#fff;padding:3px 8px;text-transform:uppercase}
  .tape-top .cap{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:#c9c9c4;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tape-top .cap.err{color:#ff6b6b}
  .tape-top .pct{margin-left:auto;font-family:var(--sp);font-weight:700;font-size:15px;color:#fff;letter-spacing:.03em}
  .stripes{position:relative;z-index:1;height:46px;display:flex;justify-content:space-between;align-items:center;overflow:hidden}
  .stripes .s{width:9px;height:165%;flex:none;transform:skewX(-20deg);background:#2b2b30;
    transition:background .3s cubic-bezier(.32,.72,0,1),box-shadow .3s,filter .3s}
  .stripes .s.fill{background:#ededea}
  .stripes .s.g3{background:#fafafa;box-shadow:0 0 8px 2px rgba(255,255,255,.32)}
  .stripes .s.g2{background:#fff;box-shadow:0 0 13px 3px rgba(255,255,255,.6)}
  .stripes .s.lead{background:#fff;box-shadow:0 0 18px 5px rgba(255,255,255,.95),0 0 36px 13px rgba(255,255,255,.5);filter:blur(.2px)}
  .tape-foot{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:#67675f;text-transform:uppercase;margin-top:11px;line-height:1.6;position:relative;z-index:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .footrow{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  .outpath{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-2)}
  .outpath .k{color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-size:10px;margin-right:8px}
  .finder{font-family:var(--tech);font-weight:600;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);padding:8px 16px;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:.25s cubic-bezier(.32,.72,0,1)}
  .finder:hover{background:var(--ink);color:var(--bg)}
  @media(max-width:740px){.console-row{flex-wrap:wrap}.fetch{width:100%;border-left:0;border-top:1.5px solid var(--ink);padding:16px}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="vframe"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>

<div class="wrap">
  <div class="topbar">
    <span class="blink"></span> <b>SYS/ONLINE</b> <span>LOCAL · 127.0.0.1:8900</span>
  </div>

  <div class="brand">
    <img class="logo" src="{{ logo }}" alt="The TET">
    <div class="bk">
      <div class="name"><span class="the">THE</span>TET<span class="dot">.</span></div>
      <div class="desc">UNIVERSAL MEDIA EXTRACTOR</div>
    </div>
  </div>

  <div class="stack">
    <div class="hero">
      <div class="console">
        <div class="console-row">
          <div class="prompt">&gt;</div>
          <input id="url" placeholder="Paste a link — YouTube, Instagram, Threads, Telegram, file…" spellcheck="false" autocomplete="off">
          <button class="fetch" id="go">EXTRACT ↗</button>
        </div>
      </div>
      <div class="detect">
        <span class="lbl">SOURCE //</span>
        <span class="chip" data-src="video">VIDEO</span>
        <span class="chip" data-src="instagram">INSTAGRAM</span>
        <span class="chip" data-src="threads">THREADS</span>
        <span class="chip" data-src="telegram">TELEGRAM</span>
        <span class="chip" data-src="file">FILE</span>
      </div>
    </div>

    <div class="qsection" id="qsection">
      <div class="secthead">
        <div class="h"><span class="sl">///</span> EXTRACTION QUEUE</div>
        <div class="meta" id="qmeta">00 ACTIVE</div>
      </div>
      <div id="queue"></div>
      <div class="footrow">
        <div class="outpath"><span class="k">OUTPUT</span> {{ output_dir }}</div>
        <button class="finder" id="revealLast">▣ REVEAL IN FINDER</button>
      </div>
    </div>
  </div>
</div>

<script>
const N = 20;
const urlEl = document.getElementById('url');
const goEl  = document.getElementById('go');
const queueEl = document.getElementById('queue');
const qsection = document.getElementById('qsection');
const qmeta = document.getElementById('qmeta');
const cards = [];
let lastJob = null;

// --- client-side source detect (mirrors tet/detect.py) for the chips ---
const VIDEO_HOSTS = ['youtube.com','youtu.be','tiktok.com','twitter.com','x.com','vimeo.com','facebook.com','fb.watch','reddit.com','twitch.tv','dailymotion.com','soundcloud.com','streamable.com','vk.com','ok.ru','bilibili','rutube','pinterest','tumblr.com','loom.com'];
const FILE_EXT = /\.(mp4|mov|mkv|webm|avi|mp3|m4a|wav|flac|ogg|jpg|jpeg|png|gif|webp|pdf|zip|rar|7z|docx?|xlsx?|pptx?|csv|txt|gz|tar|dmg|exe|apk|epub)$/;
function detect(url){
  const u=url.toLowerCase().trim();
  if(!u) return null;
  if(u.includes('threads.com')||u.includes('threads.net')) return 'threads';
  if(u.includes('instagram.com')||u.includes('instagr.am')) return 'instagram';
  if(u.includes('t.me/')||u.includes('telegram.me/')) return 'telegram';
  if(VIDEO_HOSTS.some(h=>u.includes(h))) return 'video';
  if(FILE_EXT.test(u.split('?')[0])) return 'file';
  return 'video';
}
function paintChips(){
  const s=detect(urlEl.value);
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c.dataset.src===s));
}
urlEl.addEventListener('input', paintChips);
urlEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); extract(); }});
goEl.addEventListener('click', extract);
document.getElementById('revealLast').addEventListener('click', ()=>reveal(lastJob));

function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function host(u){try{return new URL(u).hostname.replace('www.','');}catch{return u;}}

function makeCard(card){
  const el=document.createElement('div');
  el.className='qcard';
  el.innerHTML=`
    <div class="qhead">
      <span class="tag">${esc(card.source)}</span>
      <span class="ttl">${esc(card.title||host(card.url))}</span>
      <span class="ji">JOB#${card.jobId.toUpperCase()}</span>
    </div>
    <div class="tape">
      <div class="tape-top">
        <span class="erc">ERC.</span>
        <span class="cap">CAUTION // INITIALIZING</span>
        <span class="pct">—</span>
      </div>
      <div class="stripes">${'<div class="s"></div>'.repeat(N)}</div>
      <div class="tape-foot">#${card.jobId.toUpperCase()} · ${esc(card.source)} TAPE</div>
    </div>`;
  queueEl.prepend(el);
  card.el=el;
  card.stripeEls=[...el.querySelectorAll('.s')];
  card.ttlEl=el.querySelector('.ttl');
  card.capEl=el.querySelector('.cap');
  card.pctEl=el.querySelector('.pct');
}

function paint(card){
  card.ttlEl.textContent = card.title || host(card.url);
  card.capEl.classList.toggle('err', card.status==='error');
  if(card.status==='error'){
    card.capEl.textContent = 'ERROR // ' + (card.error||'FAILED');
    card.pctEl.textContent = '!!';
    card.stripeEls.forEach(s=>s.className='s');
    return;
  }
  if(card.status==='done'){
    card.capEl.textContent = `TAPE COMPLETE // ${card.files.length} FILE${card.files.length===1?'':'S'}`;
    card.pctEl.textContent = '100%';
    card.stripeEls.forEach(s=>{s.className='s fill';});
    return;
  }
  // working
  if(card.progress==null){
    card.capEl.textContent='CAUTION // READING SOURCE';
    card.pctEl.textContent='···';
    // stripes handled by indeterminate animator
  }else{
    card.capEl.textContent='CAUTION // WRITING MAGNETIC TAPE';
    card.pctEl.textContent=card.progress+'%';
    const lead=Math.round(card.progress/100*N);
    card.stripeEls.forEach((c,i)=>{c.className='s';
      if(i>lead-1)return; c.classList.add('fill');
      const d=lead-1-i; if(d===0)c.classList.add('lead');else if(d===1)c.classList.add('g2');else if(d===2)c.classList.add('g3');});
  }
}

// indeterminate sweep
let phase=0;
setInterval(()=>{
  phase++;
  cards.forEach(card=>{
    if(card.status==='working' && card.progress==null && card.stripeEls){
      const lead=phase%(N+6);
      card.stripeEls.forEach((c,i)=>{c.className='s';
        const d=lead-i;
        if(d>=0&&d<=2){c.classList.add('fill');
          if(d===0)c.classList.add('lead');else if(d===1)c.classList.add('g2');else c.classList.add('g3');}});
    }
  });
}, 120);

function updateMeta(){
  const active=cards.filter(c=>c.status==='working').length;
  qmeta.textContent=String(active).padStart(2,'0')+' ACTIVE · '+String(cards.length).padStart(2,'0')+' TOTAL';
}

async function extract(){
  const url=urlEl.value.trim();
  if(!url) return;
  goEl.disabled=true; goEl.textContent='SENDING…';
  try{
    const res=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const data=await res.json();
    if(data.error){ alert(data.error); return; }
    const card={jobId:data.job_id,url,source:data.source,status:'working',progress:null,title:null,files:[]};
    cards.push(card);
    qsection.classList.add('show');
    makeCard(card); paint(card); updateMeta();
    urlEl.value=''; paintChips();
    poll(card);
  }catch(e){ alert('Request failed: '+e.message); }
  finally{ goEl.disabled=false; goEl.textContent='EXTRACT ↗'; }
}

function poll(card){
  const iv=setInterval(async ()=>{
    try{
      const r=await fetch('/api/status/'+card.jobId);
      const d=await r.json();
      card.status=d.status; card.progress=d.progress; card.title=d.title;
      card.files=d.files||[]; card.error=d.error;
      paint(card); updateMeta();
      if(d.status==='done'){ lastJob=card.jobId; clearInterval(iv); }
      else if(d.status==='error'){ clearInterval(iv); }
    }catch{ clearInterval(iv); card.status='error'; card.error='Lost server'; paint(card); }
  }, 700);
}

async function reveal(jobId){
  await fetch('/api/reveal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})});
}
</script>
</body>
</html>
